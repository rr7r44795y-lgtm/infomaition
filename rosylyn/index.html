<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人简历</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <section id="info" class="section"></section>
        <section id="skill" class="section"></section>
        <section id="edu" class="section"></section>
        <section id="practice" class="section"></section>
        <section id="project" class="section"></section>
        <section id="competition" class="section"></section>
        <section id="campus" class="section"></section>
        <section id="works" class="section"></section>
    </div>

<script>
async function loadScriptsInOrder() {
    const jsList = [
        "js/navbar.js",
        "js/footer.js",
        "js/particle.js",
        "js/script.js"
    ];
    for (const src of jsList) {
        await new Promise((resolve) => {
            const script = document.createElement("script");
            script.src = src;
            script.onload = resolve;
            document.body.appendChild(script);
        });
    }
    renderResume();
}
document.addEventListener("DOMContentLoaded", loadScriptsInOrder);
</script>
</body>
</html>
